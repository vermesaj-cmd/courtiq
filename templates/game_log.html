{% extends "base.html" %}
{% block title %}{{ 'Edit' if log else 'Add' }} Game Log — CourtIQ{% endblock %}

{% block content %}
<h3 class="fw-bold mb-3">
    <i class="bi bi-journal-text"></i> {{ 'Edit' if log else 'Add' }} Game Log &mdash; {{ player.first_name }} {{ player.last_name }}
</h3>

<form method="post" action="{% if log %}/players/{{ player.id }}/game-log/{{ log.id }}/edit{% else %}/players/{{ player.id }}/game-log{% endif %}">
    <div class="card mb-4">
        <div class="card-header">Game Info</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Date *</label>
                    <input type="date" class="form-control" name="game_date" value="{{ log.game_date if log else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Opponent *</label>
                    <input type="text" class="form-control" name="opponent" value="{{ log.opponent if log else '' }}" required placeholder="Team name">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Result</label>
                    <select class="form-select" name="result">
                        <option value="">—</option>
                        <option value="W" {% if log and log.result == 'W' %}selected{% endif %}>W</option>
                        <option value="L" {% if log and log.result == 'L' %}selected{% endif %}>L</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Minutes</label>
                    <input type="number" class="form-control" name="minutes" value="{{ log.minutes if log else '' }}" min="0" max="48">
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Stats</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Points</label>
                    <input type="number" class="form-control" name="points" value="{{ log.points if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Rebounds</label>
                    <input type="number" class="form-control" name="rebounds" value="{{ log.rebounds if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Assists</label>
                    <input type="number" class="form-control" name="assists" value="{{ log.assists if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Steals</label>
                    <input type="number" class="form-control" name="steals" value="{{ log.steals if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Blocks</label>
                    <input type="number" class="form-control" name="blocks" value="{{ log.blocks if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Turnovers</label>
                    <input type="number" class="form-control" name="turnovers" value="{{ log.turnovers if log else '' }}" min="0">
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-2">
                    <label class="form-label">FG Made</label>
                    <input type="number" class="form-control" name="fg_made" value="{{ log.fg_made if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">FG Att</label>
                    <input type="number" class="form-control" name="fg_attempted" value="{{ log.fg_attempted if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">3PT Made</label>
                    <input type="number" class="form-control" name="three_made" value="{{ log.three_made if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">3PT Att</label>
                    <input type="number" class="form-control" name="three_attempted" value="{{ log.three_attempted if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">FT Made</label>
                    <input type="number" class="form-control" name="ft_made" value="{{ log.ft_made if log else '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">FT Att</label>
                    <input type="number" class="form-control" name="ft_attempted" value="{{ log.ft_attempted if log else '' }}" min="0">
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-2">
                    <label class="form-label">Fouls</label>
                    <input type="number" class="form-control" name="fouls" value="{{ log.fouls if log else '' }}" min="0" max="6">
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning"><i class="bi bi-check-lg"></i> {{ 'Update' if log else 'Save' }} Game Log</button>
        <a href="/players/{{ player.id }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
