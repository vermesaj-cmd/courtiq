{% extends "base.html" %}
{% block title %}Add Player — CourtIQ{% endblock %}

{% block content %}
<h3 class="fw-bold mb-3"><i class="bi bi-person-plus"></i> Add Player</h3>

<form method="post" action="/players/add">
    <!-- Player Info -->
    <div class="card mb-4">
        <div class="card-header">Player Info</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">First Name *</label>
                    <input type="text" class="form-control" name="first_name" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Last Name *</label>
                    <input type="text" class="form-control" name="last_name" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Position *</label>
                    <select class="form-select" name="position" required>
                        {% for p in positions %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Jersey #</label>
                    <input type="number" class="form-control" name="jersey_number" min="0" max="99">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Class Year *</label>
                    <input type="number" class="form-control" name="grad_year" value="2026" required>
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-2">
                    <label class="form-label">Height (ft)</label>
                    <select class="form-select" id="height_feet">
                        {% for ft in range(4, 8) %}
                        <option value="{{ ft }}" {% if ft == 6 %}selected{% endif %}>{{ ft }}'</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Height (in)</label>
                    <select class="form-select" id="height_inches_part">
                        {% for i in range(0, 12) %}
                        <option value="{{ i }}">{{ i }}"</option>
                        {% endfor %}
                    </select>
                </div>
                <input type="hidden" name="height_inches" id="height_inches" value="72">
                <div class="col-md-2">
                    <label class="form-label">Weight (lbs)</label>
                    <input type="number" class="form-control" name="weight" min="80" max="400">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Wingspan (ft)</label>
                    <select class="form-select" id="ws_feet">
                        <option value="">—</option>
                        {% for ft in range(4, 8) %}
                        <option value="{{ ft }}">{{ ft }}'</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Wingspan (in)</label>
                    <select class="form-select" id="ws_inches_part">
                        <option value="">—</option>
                        {% for i in range(0, 12) %}
                        <option value="{{ i }}">{{ i }}"</option>
                        {% endfor %}
                    </select>
                </div>
                <input type="hidden" name="wingspan_inches" id="wingspan_inches" value="">
                <div class="col-md-2">
                    <label class="form-label">GPA</label>
                    <input type="number" class="form-control" name="gpa" step="0.01" min="0" max="5.0">
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        {% for s in statuses %}
                        <option value="{{ s }}">{{ s|capitalize }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Season Averages -->
    <div class="card mb-4">
        <div class="card-header">Season Averages <small class="text-muted">(optional — can also enter via game logs later)</small></div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">GP</label>
                    <input type="number" class="form-control" name="games_played" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">MPG</label>
                    <input type="number" class="form-control" name="mpg" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">PPG</label>
                    <input type="number" class="form-control" name="ppg" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">RPG</label>
                    <input type="number" class="form-control" name="rpg" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">APG</label>
                    <input type="number" class="form-control" name="apg" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">SPG</label>
                    <input type="number" class="form-control" name="spg" step="0.1" value="0">
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-2">
                    <label class="form-label">BPG</label>
                    <input type="number" class="form-control" name="bpg" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">FG%</label>
                    <input type="number" class="form-control" name="fg_pct" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">3PT%</label>
                    <input type="number" class="form-control" name="three_pct" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">FT%</label>
                    <input type="number" class="form-control" name="ft_pct" step="0.1" value="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">TOPG</label>
                    <input type="number" class="form-control" name="topg" step="0.1" value="0">
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning"><i class="bi bi-check-lg"></i> Add Player</button>
        <a href="/players" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
